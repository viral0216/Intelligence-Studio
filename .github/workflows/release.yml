name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Install desktop dependencies
        run: npm ci
        working-directory: desktop

      - name: Build desktop app (macOS)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac
        working-directory: desktop

      - name: Ad-hoc sign macOS app
        if: matrix.platform == 'mac'
        run: codesign -s - --force --deep "desktop/dist/mac-arm64/Intelligence Studio.app"

      - name: Package macOS app with launcher
        if: matrix.platform == 'mac'
        run: |
          mkdir -p "desktop/dist/pkg"
          cp -R "desktop/dist/mac-arm64/Intelligence Studio.app" "desktop/dist/pkg/"
          cat > "desktop/dist/pkg/Open Intelligence Studio.command" << 'EOF'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          APP="$DIR/Intelligence Studio.app"
          xattr -dr com.apple.quarantine "$APP" 2>/dev/null
          open "$APP"
          EOF
          chmod +x "desktop/dist/pkg/Open Intelligence Studio.command"
          ditto -c -k --sequesterRsrc --keepParent "desktop/dist/pkg" "desktop/dist/Intelligence-Studio-mac-arm64.zip"

      - name: Build desktop app (Windows)
        if: matrix.platform == 'win'
        run: npx electron-builder --win
        working-directory: desktop

      - name: Upload macOS artifacts
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: release-mac
          path: desktop/dist/Intelligence-Studio-mac-arm64.zip

      - name: Upload Windows artifacts
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: release-win
          path: |
            desktop/dist/*.exe

  exports:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Generate catalog exports
        run: npx tsx --tsconfig frontend/tsconfig.json scripts/generate-catalog-exports.ts dist/exports

      - name: Upload export artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-exports
          path: dist/exports/*.json

  release:
    needs: [build, exports]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Installation

            ### macOS (Apple Silicon)
            1. Download `Intelligence-Studio-mac-arm64.zip`
            2. Extract the zip
            3. **Double-click `Open Intelligence Studio.command`** to launch on first run
               - This removes the macOS quarantine flag and opens the app automatically
               - After first launch, you can open the `.app` directly

            > **Note:** macOS may show a security warning on first open because the app is not notarized. The `.command` launcher handles this automatically.

            ### Windows
            Download and run the `.exe` installer.
          files: artifacts/*
