<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Hexagon outline -->
  <polygon points="100,15 170,60 170,140 100,185 30,140 30,60"
           fill="none"
           stroke="#38bdf8"
           stroke-width="5"
           stroke-linejoin="miter"
           vector-effect="non-scaling-stroke"
           shape-rendering="crispEdges"/>

  <!-- Intelligence Studio Icon: Neural/insight network -->
  <g transform="translate(100, 100)">
    <!-- Central brain-spark: diamond lens shape -->
    <path d="M0,-28 L16,0 L0,28 L-16,0 Z"
          fill="none"
          stroke="#38bdf8"
          stroke-width="3.5"
          stroke-linejoin="round"/>

    <!-- Inner eye/lens -->
    <circle cx="0" cy="0" r="7"
            fill="none"
            stroke="#38bdf8"
            stroke-width="3"/>

    <!-- Center dot -->
    <circle cx="0" cy="0" r="2.5" fill="#38bdf8"/>

    <!-- Network nodes radiating outward -->
    <!-- Top-left node -->
    <line x1="-11" y1="-14" x2="-28" y2="-26" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="-30" cy="-28" r="3.5" fill="#38bdf8"/>

    <!-- Top-right node -->
    <line x1="11" y1="-14" x2="28" y2="-26" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="30" cy="-28" r="3.5" fill="#38bdf8"/>

    <!-- Right node -->
    <line x1="16" y1="0" x2="34" y2="0" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="37" cy="0" r="3.5" fill="#38bdf8"/>

    <!-- Left node -->
    <line x1="-16" y1="0" x2="-34" y2="0" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="-37" cy="0" r="3.5" fill="#38bdf8"/>

    <!-- Bottom-left node -->
    <line x1="-11" y1="14" x2="-28" y2="26" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="-30" cy="28" r="3.5" fill="#38bdf8"/>

    <!-- Bottom-right node -->
    <line x1="11" y1="14" x2="28" y2="26" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="30" cy="28" r="3.5" fill="#38bdf8"/>

    <!-- Connecting arcs between outer nodes (subtle network) -->
    <line x1="-30" y1="-28" x2="30" y2="-28" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <line x1="30" y1="-28" x2="37" y2="0" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <line x1="37" y1="0" x2="30" y2="28" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <line x1="30" y1="28" x2="-30" y2="28" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <line x1="-30" y1="28" x2="-37" y2="0" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <line x1="-37" y1="0" x2="-30" y2="-28" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  </g>
</svg>
